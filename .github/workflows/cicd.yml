name: CI/CD Pipeline — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    
    # ADD THIS BLOCK
permissions:
  contents: read
  security-events: write
  actions: read
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-k8s-demo
  HELM_CHART: ./helm/fastapi-app
  K8S_NAMESPACE: fastapi-app

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint & Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/

  # ─────────────────────────────────────────
  # JOB 2 — Security Scan
  # ─────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ─────────────────────────────────────────
  # JOB 3 — Build & Push Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
          format: "table"
          severity: "CRITICAL,HIGH"

  # ─────────────────────────────────────────
  # JOB 4 — Deploy to Kubernetes (main only)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://fastapi.local
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "v3.14.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Extract short SHA
        id: sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Helm upgrade / install
        run: |
          helm upgrade --install fastapi-app ${{ env.HELM_CHART }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.DOCKER_IMAGE }} \
            --set image.tag=sha-${{ steps.sha.outputs.sha }} \
            --set env.APP_ENV=production \
            --atomic \
            --timeout 5m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/fastapi-app \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=fastapi-app \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=120s
          echo "✅ Deployment successful!"

  # ─────────────────────────────────────────
  # JOB 5 — Notify on failure
  # ─────────────────────────────────────────
  notify:
    name: 📣 Notify
    runs-on: ubuntu-latest
    needs: [test, security, build, deploy]
    if: always()
    steps:
      - name: Notify on success
        if: ${{ needs.deploy.result == 'success' }}
        run: echo "✅ Pipeline succeeded! Image deployed."

      - name: Notify on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: echo "❌ Pipeline failed. Check logs above."
