# ─────────────────────────────────────────
# ServiceAccount
# ─────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fastapi-app-sa
  namespace: fastapi-app
  labels:
    app: fastapi-app

---
# ─────────────────────────────────────────
# ConfigMap — non-sensitive configuration
# ─────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: fastapi-config
  namespace: fastapi-app
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"

---
# ─────────────────────────────────────────
# Secret — sensitive values (base64 encoded)
# echo -n "mysecretkey" | base64
# ─────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-secrets
  namespace: fastapi-app
type: Opaque
data:
  SECRET_KEY: bXlzZWNyZXRrZXk=   # "mysecretkey" — change in production!

---
# ─────────────────────────────────────────
# Service — ClusterIP for internal routing
# ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: fastapi-app-svc
  namespace: fastapi-app
  labels:
    app: fastapi-app
spec:
  selector:
    app: fastapi-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# ─────────────────────────────────────────
# HorizontalPodAutoscaler
# ─────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-app-hpa
  namespace: fastapi-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
